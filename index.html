<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP-700 Study Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #2d3142; --bg-alt: #4f5d75; --silver: #bfc0c0; --white: #ffffff; --orange: #ef8354; --danger: #ff5f5f; --font-din: "Inter", sans-serif;
        }
        body {
            background: var(--bg-dark); color: var(--white); font-family: var(--font-din);
            margin: 0; display: flex; height: 100vh; font-weight: 300; overflow: hidden;
        }
        .sidebar {
            width: 280px; background: rgba(45, 49, 66, 0.95); border-right: 1px solid var(--bg-alt);
            padding: 30px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 600; letter-spacing: 3px; margin-bottom: 40px; color: var(--orange); text-transform: uppercase; }
        .label-sm { font-size: 11px; color: var(--silver); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .topic-stat { color: var(--orange); font-weight: 600; }
        .reset-link { font-size: 10px; color: var(--silver); cursor: pointer; text-decoration: underline; opacity: 0.6; transition: 0.3s; }
        .reset-link:hover { color: var(--danger); opacity: 1; }
        
        .select-box, .search-bar {
            background: var(--bg-alt); color: var(--white); border: 1px solid transparent;
            padding: 12px; border-radius: 4px; outline: none; margin-bottom: 20px; font-family: var(--font-din); width: 100%; box-sizing: border-box;
        }
        .search-bar:focus { border-color: var(--orange); }
        .progress-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 4px; margin-top: 20px; }
        .progress-bar-bg { background: var(--bg-dark); height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: var(--orange); height: 100%; width: 0%; transition: 0.5s ease; }

        .btn-reset-all {
            background: transparent; border: 1px solid rgba(255, 95, 95, 0.3); color: var(--danger);
            padding: 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-reset-all:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .main { flex: 1; overflow-y: auto; padding: 60px; background: linear-gradient(135deg, var(--bg-dark) 0%, #1e212d 100%); }
        .header-banner { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 4px; padding: 30px; margin-bottom: 40px; }
        .list-item {
            display: flex; align-items: center; background: rgba(191, 192, 192, 0.05); border: 1px solid rgba(191, 192, 192, 0.1);
            margin-bottom: 10px; padding: 15px 25px; border-radius: 4px; text-decoration: none; color: var(--silver); transition: 0.3s ease;
        }
        .list-item:hover { background: var(--bg-alt); border-color: var(--orange); transform: translateX(8px); }
        .check-btn {
            width: 22px; height: 22px; border: 2px solid var(--orange); border-radius: 4px; 
            margin-right: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .check-btn.active { background: var(--orange); }
        .check-btn.active::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }
        .q-link { flex: 1; display: flex; align-items: center; text-decoration: none; color: inherit; }
        .q-id { font-weight: 600; color: var(--white); width: 120px; font-size: 15px; }
        .go-icon { color: var(--orange); font-size: 18px; margin-left: 10px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-alt); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">FABRIC // DP-700</div>
        
        <div class="label-sm">Provider / Source</div>
        <select class="select-box" id="sourceDropdown">
            <option value="ExamTopics">ExamTopics (ET)</option>
        </select>

        <div class="label-sm">
            <span>Domain / Topic <span class="topic-stat" id="topicPercent">0%</span></span>
            <span class="reset-link" onclick="resetTopic()">Reset Topic</span>
        </div>
        <select class="select-box" id="topicDropdown">

            <option value="Topic 2">Topic 2: Data Modeling</option>
            <option value="Topic 3">Topic 3: Monitor & Optimize</option>
        </select>

        <div class="label-sm">Search Questions</div>
        <input type="text" class="search-bar" id="searchInput" placeholder="Filter questions...">

        <div class="progress-box">
            <div class="label-sm">Overall Completion</div>
            <div id="progressText" style="font-size: 18px; color: var(--orange); font-weight: 600;">0%</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <button class="btn-reset-all" onclick="resetAll()">Reset All Progress</button>

        <div style="margin-top: auto; padding-top: 20px;">
            <div style="font-size: 12px; color: var(--orange); font-weight: 600;">NODE: ZA_GAUTENG</div>
        </div>
    </div>

                    { q: 11, url: "https://www.examtopics.com/discussions/microsoft/view/302562-exam-dp-700-topic-3-question-11-discussion/" },
                    { q: 12, url: "https://www.examtopics.com/discussions/microsoft/view/302503-exam-dp-700-topic-3-question-12-discussion/" },
                    { q: 13, url: "https://www.examtopics.com/discussions/microsoft/view/302546-exam-dp-700-topic-3-question-13-discussion/" },
                    { q: 14, url: "https://www.examtopics.com/discussions/microsoft/view/302447-exam-dp-700-topic-3-question-14-discussion/" },
                    { q: 15, url: "https://www.examtopics.com/discussions/microsoft/view/304614-exam-dp-700-topic-3-question-15-discussion/" },
                    { q: 16, url: "https://www.examtopics.com/discussions/microsoft/view/304566-exam-dp-700-topic-3-question-16-discussion/" }
                ]
            }
        };

        const sourceDropdown = document.getElementById('sourceDropdown');
        const topicDropdown = document.getElementById('topicDropdown');
        const list = document.getElementById('questionList');
        const searchInput = document.getElementById('searchInput');
        const header = document.getElementById('viewHeader');
        const topicPercentLabel = document.getElementById('topicPercent');
        
        let checkedItems = JSON.parse(localStorage.getItem('dp700_progress_v2')) || {};

        function updateProgress() {
            let totalOverall = 0;
            let completedOverall = Object.keys(checkedItems).length;

            Object.keys(masterData).forEach(src => {
                Object.keys(masterData[src]).forEach(top => {
                    totalOverall += masterData[src][top].length;
                });
            });

            const overallPercent = totalOverall > 0 ? Math.round((completedOverall / totalOverall) * 100) : 0;
            document.getElementById('progressFill').style.width = overallPercent + '%';
            document.getElementById('progressText').innerText = overallPercent + '%';

            const currentSource = sourceDropdown.value;
            const currentTopic = topicDropdown.value;
            const topicQuestions = masterData[currentSource][currentTopic] || [];
            
            let completedTopic = 0;
            topicQuestions.forEach(item => {
                const qKey = `${currentSource}_${currentTopic}_Q${item.q}`;
                if (checkedItems[qKey]) completedTopic++;
            });

            const topicPercent = topicQuestions.length > 0 ? Math.round((completedTopic / topicQuestions.length) * 100) : 0;
            topicPercentLabel.innerText = topicPercent + '%';
        }

        window.toggleCheck = function(qKey, event) {
            event.stopPropagation();
            if (checkedItems[qKey]) {
                delete checkedItems[qKey];
            } else {
                checkedItems[qKey] = true;
            }
            saveAndSync();
        }

        window.resetTopic = function() {
            const currentSource = sourceDropdown.value;
            const currentTopic = topicDropdown.value;
            if (confirm(`Reset all progress for ${currentTopic}?`)) {
                const topicQuestions = masterData[currentSource][currentTopic] || [];
                topicQuestions.forEach(item => {
                    const qKey = `${currentSource}_${currentTopic}_Q${item.q}`;
                    delete checkedItems[qKey];
                });
                saveAndSync();
            }
        }

        window.resetAll = function() {
            if (confirm("ARE YOU SURE? This will wipe all progress across all topics and sources.")) {
                checkedItems = {};
                saveAndSync();
            }
        }

        function saveAndSync() {
            localStorage.setItem('dp700_progress_v2', JSON.stringify(checkedItems));
            render();
            updateProgress();
        }

        function render() {
            const source = sourceDropdown.value;
            const topic = topicDropdown.value;
            const searchTerm = searchInput.value.toLowerCase();
            header.innerText = `${source.toUpperCase()} REGISTRY`;
            
            const currentQuestions = masterData[source][topic] || [];
            
            list.innerHTML = currentQuestions
                .filter(item => `Question ${item.q}`.toLowerCase().includes(searchTerm))
                .map(item => {
                    const qKey = `${source}_${topic}_Q${item.q}`;
                    const isActive = checkedItems[qKey] ? 'active' : '';
                    return `
                        <div class="list-item">
                            <div class="check-btn ${isActive}" onclick="toggleCheck('${qKey}', event)"></div>
                            <a href="${item.url}" target="_blank" class="q-link">
                                <span class="q-id">QUESTION ${item.q}</span>
                                <span style="font-size: 13px; opacity: 0.8; flex: 1;">Verified discussion stream</span>
                                <span class="go-icon">→</span>
                            </a>
                        </div>
                    `;
                }).join('');
            
            updateProgress();
        }

        sourceDropdown.addEventListener('change', render);
        topicDropdown.addEventListener('change', render);
        searchInput.addEventListener('input', render);
        render();
    </script>
</body>
</html>
